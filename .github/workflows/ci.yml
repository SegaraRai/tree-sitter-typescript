            examples/vscode/src/vs/workbench/contrib/testing/common/testCoverage.ts
            examples/vscode/src/vs/workbench/contrib/webview/browser/webviewElement.ts
            examples/vscode/src/vs/workbench/services/editor/browser/editorResolverService.ts
